services:
  - type: web
    name: invoice-ai-backend
    env: python
    buildCommand: "pip install -r requirements.txt && apt-get install -y tesseract-ocr"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: invoices
      - key: OPENAI_API_KEY
        sync: false
